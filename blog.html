## 引言

青铜器鉴定，首重锈色。古人云"千年古铜，万年锈蚀"，锈色是时光在青铜器上留下的指纹，每一层铜绿都诉说着一段被掩埋的历史。

## 锈色的形成机理

青铜器埋藏于地下，铜与土壤中的水、氧气、二氧化碳及各类盐分发生复杂的化学反应，形成不同颜色的锈蚀产物。

### 绿锈（碱式碳酸铜）

绿锈是最常见的青铜器锈色，主要成分为碱式碳酸铜。天然绿锈呈现出层次分明的结晶结构，在放大镜下可见细密的晶体颗粒，颜色从翠绿到墨绿不等，过渡自然。

### 红锈（氧化亚铜）

红锈又称"枣皮红"，是青铜器在缺氧环境下形成的氧化亚铜层。真正的红锈紧贴器表，坚硬致密，色泽温润如同陈年红枣皮。

### 蓝锈（碱式硫酸铜）

蓝锈较为罕见，多出现在南方潮湿墓葬中。天然蓝锈如蓝宝石般晶莹，有"孔雀蓝"之美誉。

## 实战鉴别要点

1. **看层次**：真锈有底锈和浮锈之分，层次分明，过渡自然；伪锈往往单一均匀。
2. **摸手感**：真锈坚硬牢固，用指甲难以刮落；伪锈松散易掉。

## 结语

鉴定之道，贵在多看真品、积累经验。锈色仅是入门之阶，需结合器型、纹饰、铭文、铸造工艺等多维度综合判断，方能去伪存真。

## 气韵之说

南朝谢赫在《古画品录》中提出"六法"，首重"气韵生动"。此论虽为画论，用于书法亦然。书法之气韵，是贯通全篇的生命律动，是书者精神气质在纸面上的投射。

## 何谓"气"

"气"是书法的内在动力。观王羲之《兰亭序》，通篇二十八个"之"字无一雷同，章法如行云流水，一气呵成，这便是"气"的体现。

养气之法有三：

1. **读书养气**：苏东坡云"腹有诗书气自华"，深厚的学养是书法之气的不竭源泉。
2. **静坐调息**：下笔之前，先调匀呼吸，让心归于平静，让气沉于丹田。
3. **持之以恒**：每日临池不辍，久而久之，笔墨之间自然有了一股贯通之气。

## 何谓"韵"

"韵"是书法的外在风神。它超越了点画结构的层面，是一种只可意会、难以言传的美感。王献之的潇洒、颜真卿的雄浑、米芾的跌宕，各具其韵。

- **取法乎上**：取法古人经典，但不可一味模仿，要有所取舍，化为己用。
- **意在笔先**：下笔之前，胸中已有全篇的风神气度，而非逐字拼凑。
- **收放自如**：书法贵在变化，大胆落墨，小心收拾，在奔放中见法度，在严谨中见灵动。

## 引言

艺术品市场水深，这是业内的共识。然而水虽深，有舟可渡。这叶"舟"，便是我从业三十年总结出的"三看"原则。

## 一看"真"

"真"是艺术品投资的基石。买到赝品，一切归零。

如何确保"真"：

1. **来源清晰**：优先选择有明确出版著录、展览记录的藏品。

## 二看"精"

"精"决定了藏品的升值空间。同一位画家的作品，精品与应酬之作的价格可以相差十倍甚至百倍。

判断"精"的标准：

- 是否为艺术家的代表作或巅峰期作品
- 是否在重要展览中展出过
- 品相是否完好，有无修复痕迹
- 题材是否属于艺术家的拿手领域

## 三看"势"

"势"是对市场趋势的判断。再好的藏品，如果买在市场最高点，短期也难获利。

- 关注宏观经济周期与艺术市场的关联

- 耐心等待，不要追高买入

## 结语

艺术品投资，终究是一场考验眼力、定力和耐心的马拉松。守住"看真、看精、看势"的原则，方能在风云变幻的市场中立于不败之地。

function navigate(to) {
  window.location.hash = to;

function renderHome(activeTag) {

      <div class="divider"></div>
    </div>`;
  }

  // 标签筛选
  html += '<div class="tag-filter">';
  allTags.forEach(tag => {
    const label = tag === 'all' ? '全部' : tag;
    const active = (!activeTag && tag === 'all') || activeTag === tag;
    html += `<span class="filter-btn${active ? ' active' : ''}" onclick="filterByTag('${tag}')">${label}</span>`;

  html += '</div>';

  // 文章列表
  html += '<div class="post-list">';
  if (filtered.length === 0) {
    html += '<div class="empty-state"><div class="icon">📜</div><p>该分类下暂无文章</p></div>';
  } else {
    filtered.forEach(article => {
      html += `

          <span>${article.date}</span>

    });

  html += '</div>';

  return html;
}

function renderTags() {
  const tagCount = {};
  articles.forEach(a => {

      tagCount[t] = (tagCount[t] || 0) + 1;
    });
  });

  let html = '<div class="about-page">';
  html += '<h2 style="text-align:center;color:var(--ink);font-weight:normal;letter-spacing:2px;margin:40px 0 30px;">文章分类</h2>';
  html += '<div class="tag-filter" style="justify-content:center;">';
  for (const [tag, count] of Object.entries(tagCount)) {
    html += `<span class="filter-btn" style="font-size:14px;" onclick="filterByTag('${tag}')">${tag}（${count}篇）</span>`;
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function filterByTag(tag) {
  if (tag === 'all') {
    navigate('home');
  } else {
    navigate(`home/${tag}`);
  }
}

// ===== 应用入口 =====
function render() {
  const { page, param } = getRoute();
  const app = document.getElementById('app');

  // 更新导航高亮
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.classList.remove('active');
  });

  switch (page) {
    case 'home':
      document.querySelector('[data-nav="home"]').classList.add('active');
      app.innerHTML = renderHome(param || null);
      break;
    case 'article':
      document.querySelector('[data-nav="home"]').classList.add('active');
      app.innerHTML = renderArticle(param);
      break;
    case 'about':
      document.querySelector('[data-nav="about"]').classList.add('active');
      app.innerHTML = renderAbout();
      break;
    case 'tags':
      document.querySelector('[data-nav="tags"]').classList.add('active');
      app.innerHTML = renderTags();
      break;
    default:
      navigate('home');
      break;
  }
}

// 监听hash变化
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);
